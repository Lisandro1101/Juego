<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Ahorcado <span class="icon-main">🐝</span></title>
    <!-- ⭐️ CORRECCIÓN: Importación de todas las fuentes para que se vean en móvil ⭐️ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Caveat&family=Creepster&family=EB+Garamond&family=Inter&family=Lato&family=Lobster&family=Lora&family=Luckiest+Guy&family=Merriweather&family=Montserrat&family=Nunito&family=Open+Sans&family=Oswald&family=PT+Serif&family=Pacifico&family=Playfair+Display&family=Poppins&family=Press+Start+2P&family=Righteous&family=Roboto&family=Roboto+Mono&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        :root {
            --btn-hangman-bg: var(--bee-yellow, #FACC15);
            --btn-hangman-text-color: var(--bee-black, #1F2937);
            --btn-hangman-border-color: var(--honey-gold, #F59E0B);
            --btn-hangman-shadow-color: var(--honey-gold, #F59E0B);
        }

        /* Estilos específicos para el Ahorcado */
        .hangman-container.hangman-mode {
            /* Usar el estilo base de quiz-container */
            background-color: var(--hangman-container-bg, rgba(255, 255, 255, 0.9));
        }

        #hangman-art {
            font-family: monospace;
            white-space: pre;
            font-size: 1.2em;
            line-height: 1;
            color: var(--bee-black);
            margin: 20px auto;
            border: 2px dashed var(--honey-gold);
            padding: 10px;
            background-color: var(--spring-bg);
            border-radius: 8px;
        }

        #word-display {
            font-size: 2.5em;
            letter-spacing: 0.5em; /* Separación grande entre guiones */
            margin: 20px 0;
            font-weight: 900;
            color: var(--honey-gold);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            white-space: pre-wrap;
            word-break: break-all;
        }

        #keyboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
        }

        .key-btn {
            /* Estilo de tecla */
            background-color: var(--btn-hangman-bg);
            color: var(--btn-hangman-text-color);
            font-weight: bold;
            border: 2px solid var(--btn-hangman-border-color);
            border-radius: 6px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.1s; 
            box-shadow: 0 3px var(--btn-hangman-shadow-color);
            font-family: var(--btn-hangman-font-family);
            -webkit-text-stroke-width: var(--btn-hangman-text-stroke-width);
            -webkit-text-stroke-color: var(--btn-hangman-text-stroke-color);
            min-width: 35px;
            flex-grow: 1;
        }

        .key-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px var(--honey-gold);
            background-color: #ff9800;
        }

        .key-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px var(--honey-gold);
        }

        .key-btn:disabled {
            background-color: #ccc;
            color: #666;
            border-color: #999;
            box-shadow: 0 1px #999;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }
        
        .hangman-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #fff8e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="themed-container quiz-container hangman-container hangman-mode" data-theme-page="hangman">
        
        <div id="start-screen-hangman">
            <h1 id="hangman-title-text" class="themed-text title" data-theme-key="hangman-title">El Ahorcado <span class="icon-hangman">💀</span></h1>
            <p id="hangman-subtitle-text" class="themed-text mb-4" data-theme-key="hangman-subtitle">Ingresa tu nombre para comenzar a adivinar la palabra secreta:</p>
            
            <label for="player-name-input-hangman" class="themed-text" data-theme-key="hangman-input-label" style="display: block; font-weight: bold; margin-bottom: 5px;">Tu Nombre de Jugador:</label>

            <input type="text" id="player-name-input-hangman" class="themed-input text-input" data-theme-key="hangman-player-name" placeholder="Tu Nombre" maxlength="20"
                   style="width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 15px; border: 2px solid var(--bee-yellow); border-radius: 5px;">
            
            <button id="start-btn-hangman" class="themed-button btn-portal btn-trivia mt-4" data-theme-key="hangman-start-button">¡Comenzar!</button>

            <div style="text-align: center; margin-top: 20px;">
                <button onclick="window.location.href='index.html'" class="themed-button" data-theme-key="hangman-back-button" style="background: none; border: none; color: #666; font-size: 0.9em; cursor: pointer;">
                    Volver al Portal
                </button>
            </div>
        </div>
        
        <div id="game-mode-hangman" class="hidden">
            
            <div class="themed-container hangman-header" data-theme-key="hangman-game-header">
                <div id="player-name-display-hangman" class="themed-text" data-theme-key="hangman-player-display" style="font-weight: bold;">Jugador: -</div> 
                <div id="lives-display">Vidas restantes: 7</div>
            </div>
            
            <div id="hangman-graphic-container" class="hangman-graphic"></div>
            
            <p id="word-display" class="themed-text" data-theme-key="hangman-word-display">_ _ _ _ _</p>
            
            <p id="game-status" class="themed-text" data-theme-key="hangman-game-status" style="font-weight: bold; margin: 15px 0;">Adivina la palabra. Tienes 7 intentos.</p>
            
            <p id="guessed-letters" class="themed-text" data-theme-key="hangman-guessed-letters" style="color: #666; font-size: 0.9em;">Letras usadas: </p>
            
            <div id="keyboard-container">
                </div>
            
            <button id="play-again-hangman-btn" class="themed-button btn-portal btn-messages mt-6 hidden" data-theme-key="hangman-play-again-button">
                Jugar de Nuevo
            </button>
            
            <button onclick="window.location.href='index.html'" class="themed-button btn-portal btn-trivia mt-4" data-theme-key="hangman-back-button" style="background: #ccc; box-shadow: 0 4px #999;">
                Volver al Portal
            </button>
            
        </div>
        
    </div>
    <script type="module" src="script.js?v=1.0"></script>
</body>
</html>
