<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria <span class="icon-memory">🧠</span></title>
    <!-- ⭐️ CORRECCIÓN: Importación de todas las fuentes para que se vean en móvil ⭐️ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Caveat&family=Creepster&family=EB+Garamond&family=Inter&family=Lato&family=Lobster&family=Lora&family=Luckiest+Guy&family=Merriweather&family=Montserrat&family=Nunito&family=Open+Sans&family=Oswald&family=PT+Serif&family=Pacifico&family=Playfair+Display&family=Poppins&family=Press+Start+2P&family=Righteous&family=Roboto&family=Roboto+Mono&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ⭐️ VALORES DE RESPALDO PARA EL JUEGO DE MEMORIA ⭐️ */
        :root {
            --mem-card-height: 110px;
            --mem-card-border-radius: 10px;
            --mem-card-back-bg: var(--honey-gold, #F59E0B);
            --mem-card-back-border-color: var(--bee-black, #1F2937);
        }

        /* ⭐️ REFACTORIZADO: Usamos la clase genérica del motor de temas ⭐️ */
        .themed-container[data-theme-page="memory"] {
            background-color: var(--memory-container-bg);
            border-radius: var(--memory-container-border-radius);
        }
    
        /* Estilos específicos para la cuadrícula del juego de memoria */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columnas por defecto */
            gap: 5px;
            padding: 10px;
            /* 💡 Aumentado el ancho máximo para dar más espacio a las cartas */
            max-width: 600px; 
            margin: 20px auto;
        }

        /* 💡 SOLUCIÓN RÁPIDA: Ocultar los elementos de la cuadrícula por defecto */
        #memory-game-grid {
            display: none; 
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* ⭐️ ESTILOS DE CARTA AHORA CON VARIABLES ⭐️ */
        .card {
            background-color: transparent; /* El fondo lo da el inner */
            border: none; /* El borde lo da el back */
            height: var(--mem-card-height); 
            border-radius: var(--mem-card-border-radius);
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease-in-out;
            touch-action: manipulation;
        }
        
        /* 🚨 SOLUCIÓN AL PROBLEMA DE INTERACCIÓN 🚨 */
        .modal-full-screen.hidden {
            display: none !important;
            /* Asegura que no captura clics */
            pointer-events: none !important; 
        }

        /* 🚨 ESTILOS DEL CONTENEDOR MODAL/FLOTANTE (Para móviles) */
        .modal-full-screen {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95); 
            z-index: 9999; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto; 
        }

        /* Contenedor interno para que se vea como una sección */
        .quiz-section-floating {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px; 
            margin-top: 20px;
        }

        /* Ajuste específico para el grid dentro del modal */
        .modal-full-screen .grid-container {
            max-width: none; 
            margin: 10px auto;
        }
        .close-btn:hover {
            color: #F44336 !important;
        }

        /* RE-AJUSTE DE TAMAÑOS DE CARTA PARA MÓVILES */
        @media (max-width: 768px) {
            .modal-full-screen .card {
                height: 140px; 
            }
            .modal-full-screen .grid-container {
                max-width: 95%;
                padding: 5px;
            }
        }
        @media (max-width: 400px) {
            .modal-full-screen .card {
                height: 100px; 
            }
        }
        /* ... el resto de las reglas CSS de la tarjeta (mantenidas) ... */
    
        .card-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s; 
            transform-style: preserve-3d;
        }
        /* ... el resto de estilos de la tarjeta ... */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front {
            background-color: var(--bee-yellow);
            color: var(--bee-black);
            transform: rotateY(180deg);
            padding: 2px; 
            /* ⭐️ Aseguramos que el radius de la carta se aplique aquí */
            border-radius: var(--mem-card-border-radius);
            overflow: hidden; /* Para que la imagen no se salga */
        }

        .card-front img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            border-radius: 5px; /* Un radius más pequeño para la imagen interna */
        }

        /* ⭐️ ESTILO DEL REVERSO DE LA CARTA AHORA CON VARIABLES ⭐️ */
        .card-back {
            background-color: var(--mem-card-back-bg);
            border: 3px solid var(--mem-card-back-border-color);
            color: white;
            font-size: 1.5em;
            /* ⭐️ Aseguramos que el radius de la carta se aplique aquí */
            border-radius: var(--mem-card-border-radius);
            overflow: hidden;
        }

        /* Estilo para los resultados */
        .results-container h2 {
            color: var(--honey-gold);
            margin-bottom: 10px;
            font-size: 1.8em;
            font-weight: 900;
        }
        
    </style>
</head>
<body>
    
    <div class="themed-container quiz-container memory-mode" data-theme-page="memory">
        
        <div id="start-screen" class="quiz-section">
            <h1 id="memory-title-text" class="themed-text title" data-theme-key="memory-title">Juego de Memoria <span class="icon-memory">🧠</span></h1>
            <p class="themed-text mb-4" data-theme-key="memory-subtitle">Ingresa tu nombre para comenzar a encontrar las parejas:</p>
            
            <label for="player-name-input" class="themed-text" data-theme-key="memory-input-label" style="display: block; font-weight: bold; margin-bottom: 5px;">Tu Nombre de Jugador:</label>

            <input type="text" id="player-name-input" class="themed-input text-input" data-theme-key="memory-player-name" placeholder="Tu Nombre" maxlength="20">
            
            <button id="start-btn" class="themed-button save-btn mt-4" data-theme-key="memory-start-button">¡Comenzar!</button>

            <div style="text-align: center; margin-top: 20px;">
                <button onclick="window.location.href='index.html'" class="themed-button" data-theme-key="memory-back-button" style="background: none; border: none; color: #666; font-size: 0.9em; cursor: pointer;">
                    Volver al Portal
                </button>
            </div>
        </div>
        <div id="modal-memory-game" class="modal-full-screen hidden">
            
            <div id="game-mode-container" class="quiz-section-floating"> 
                <div id="game-header" class="themed-container" data-theme-key="memory-game-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; background: #fff8e1; border-radius: 10px;">
                    <div id="player-name-display" class="themed-text" data-theme-key="memory-player-display" style="font-weight: bold;">Jugador: -</div> 
                    <div id="timer" class="timer">Tiempo: <span>0</span>s</div>
                    <button id="close-modal-btn" class="close-btn" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: var(--bee-black); padding: 5px;">✖️</button>
                </div>
                
                <div id="memory-game-grid" class="grid-container">
                    <p class="text-center text-gray-500">Cargando imágenes...</p>
                </div>
            </div>

            <div id="results" class="results-container hidden">
                <h2 class="themed-text" data-theme-key="memory-results-title"><span class="icon-win">🎉</span> ¡Memoria Completada! <span class="icon-win">🎉</span></h2>
                <p id="final-time" class="themed-text" data-theme-key="memory-results-subtitle">Tu tiempo fue de: 0 segundos</p>
                
                <button onclick="window.location.href='index.html'" class="themed-button save-btn mt-4" data-theme-key="memory-back-button">Volver al Portal</button>
                <button id="play-again-modal-btn" class="themed-button save-btn mt-4" data-theme-key="memory-play-again-button">Jugar de Nuevo</button>
            </div>

        </div>
        </div>
    <script type="module" src="script.js?v=1.0"></script>
</body>
</html>
